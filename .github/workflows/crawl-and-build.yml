name: crawl-and-build

on:
  schedule:
    # 매일 20:00 UTC (KST 05:00 익일) 자동 실행
    - cron: '0 20 * * *'
  workflow_dispatch:  # 수동 트리거 허용

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # git push를 위해 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # sentence-transformers 모델 캐시 (첫 다운로드 후 재사용)
      - name: Cache sentence-transformers model
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: st-model-all-MiniLM-L6-v2

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 1. 크롤링 ─────────────────────────────────────────────
      - name: Run crawlers
        # 일부 크롤러 실패해도 수집된 데이터는 저장
        run: python -m crawlers.run_all || true

      # ── 1.5 기술 소스(논문) — 뉴스 파이프라인과 분리된 별도 stratum, LLM 미개입 ─
      - name: Run tech sources (arXiv papers)
        run: python -m crawlers.tech.arxiv || true

      # ── 2. Dedup Gate (임베딩 dedup + lineage) ────────────────
      - name: Run dedup gate
        run: python scripts/dedup_gate.py

      # ── 3. LLM 병합 (merged 판정 건만, ANTHROPIC_API_KEY 필수) ─
      - name: Run merge refine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/merge_refine.py

      # ── 3.5 섹터별 1문단 요약 + 상단 Top-5 (Phase 3, item 6·7) ─────────
      - name: Run sector summaries + daily top5
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/summarize_sectors.py

      # ── 4. 1차 증류 메모 → 축·카테고리별 요약 (data/distillation_notes.json
      #      이 없으면 스킵 — 프론트 "메모 내보내기" 버튼으로 수동 커밋 필요) ─
      - name: Run distillation summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/summarize_distillation.py

      # ── 5. canonical → data/refined/ JSON export ──────────────
      - name: Export refined JSON
        run: python scripts/export_refined.py

      # ── 5.5 baseline notes(장문 deep-research 노트) → JSON manifest ─
      - name: Export baseline notes
        run: python scripts/export_baseline_notes.py

      # ── 5.6 version.json의 date 필드 build 시각으로 갱신 (version/maturity는 수동) ─
      - name: Stamp version date
        run: python scripts/stamp_version.py

      # ── 6. 커밋 (data/ 전체 + soc.db 포함) ────────────────────
      - name: Commit crawled and refined data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: crawl+dedup $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push

      # ── 7. 일일 리뷰 메일링 (Phase 6, self-test) ───────────────
      # 검증 단계: workflow_dispatch 수동 트리거로 1회 발송 확인 후 이 if 조건을 제거해 cron 편입.
      # Phase 3 정적 산출물(top5/섹터요약)을 그대로 렌더 — 재계산·재요약 없음.
      - name: Send daily review email
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          REVIEW_MAIL_TO: ${{ secrets.REVIEW_MAIL_TO }}
        run: python scripts/send_review_mail.py

  deploy:
    needs: crawl
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # 브랜치 이름 지정 → crawl job이 push한 최신 커밋을 동적으로 받음
          ref: main

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Stage site artifacts
        # data/refined/ 만 site/data/ 아래로 복사 (raw/, soc.db 제외)
        run: |
          mkdir -p site/data
          cp -r data/refined site/data/

      - name: Create Cloudflare Pages project (idempotent)
        # 프로젝트가 없으면 생성, 이미 있으면 에러 무시
        run: npx wrangler pages project create soc-intelligence --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy site --project-name=soc-intelligence
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: bash scripts/check_deploy.sh https://soc-intelligence.pages.dev
